version: '3.9'

services:
  # ── MySQL Database ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: smart_dorm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smart_dormitory
      MYSQL_USER: dorm_user
      MYSQL_PASSWORD: dorm_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart_dorm_net

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_dorm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: dorm_user
      DB_PASSWORD: dorm_pass
      DB_NAME: smart_dormitory
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: 7d
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_TELEGRAM_CHAT_ID: ${ADMIN_TELEGRAM_CHAT_ID:-}
      PROMPTPAY_ID: ${PROMPTPAY_ID:-}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 5
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - smart_dorm_net

  # ── Frontend (Vite preview build) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_dorm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - smart_dorm_net

volumes:
  db_data:
  uploads_data:

networks:
  smart_dorm_net:
    driver: bridge
